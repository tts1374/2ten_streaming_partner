<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>2ten Subtitle Overlay</title>
    <style>
      :root {
        color-scheme: dark;
        --fg: #f8fafc;
        --muted: #cbd5e1;
        --accent: #22c55e;
        --shadow: rgba(0, 0, 0, 0.72);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
        font-family:
          "Yu Gothic UI", "Yu Gothic", "Hiragino Sans", "Noto Sans JP", sans-serif;
      }

      body {
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding: 0 5vw 7vh;
      }

      .subtitle {
        width: min(1200px, 92vw);
        min-height: 96px;
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 14px;
        align-items: center;
        opacity: 0;
        transform: translateY(12px);
        transition:
          opacity 180ms ease,
          transform 180ms ease;
      }

      .subtitle[data-visible="true"] {
        opacity: 1;
        transform: translateY(0);
      }

      .speaker {
        align-self: start;
        margin-top: 6px;
        padding: 5px 10px 6px;
        border: 2px solid rgba(248, 250, 252, 0.82);
        background: rgba(15, 23, 42, 0.76);
        color: var(--fg);
        font-size: 22px;
        font-weight: 700;
        line-height: 1;
        text-shadow: 0 2px 4px var(--shadow);
      }

      .text {
        color: var(--fg);
        font-size: clamp(30px, 4.6vh, 54px);
        font-weight: 800;
        line-height: 1.32;
        letter-spacing: 0;
        overflow-wrap: anywhere;
        text-wrap: balance;
        text-shadow:
          0 3px 2px var(--shadow),
          0 -2px 2px var(--shadow),
          2px 0 2px var(--shadow),
          -2px 0 2px var(--shadow),
          0 0 10px rgba(0, 0, 0, 0.62);
      }

      .detail {
        display: none;
        margin-top: 6px;
        color: var(--muted);
        font-size: 16px;
        font-weight: 700;
        line-height: 1.3;
        overflow-wrap: anywhere;
        text-shadow: 0 2px 4px var(--shadow);
      }

      .detail[data-visible="true"] {
        display: block;
      }

      .status {
        position: fixed;
        left: 24px;
        bottom: 22px;
        width: 12px;
        height: 12px;
        border-radius: 999px;
        background: var(--muted);
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
      }

      .status[data-status="listening"] {
        background: #38bdf8;
      }

      .status[data-status="thinking"] {
        background: #facc15;
      }

      .status[data-status="speaking"] {
        background: var(--accent);
      }

      .status[data-status="error"] {
        background: #fb7185;
      }

      @media (max-width: 720px) {
        body {
          padding: 0 4vw 5vh;
        }

        .subtitle {
          width: 96vw;
          min-height: 78px;
          gap: 10px;
        }

        .speaker {
          font-size: 17px;
          padding: 4px 8px 5px;
        }

        .text {
          font-size: 30px;
          line-height: 1.28;
        }
      }
    </style>
  </head>
  <body>
    <main class="subtitle" data-visible="false" aria-live="polite">
      <div class="speaker" id="speakerName">2ten</div>
      <div>
        <div class="text" id="subtitleText"></div>
        <div class="detail" id="subtitleDetail"></div>
      </div>
    </main>
    <div class="status" id="statusDot" data-status="idle"></div>
    <script>
      const subtitle = document.querySelector(".subtitle");
      const speakerName = document.getElementById("speakerName");
      const text = document.getElementById("subtitleText");
      const detail = document.getElementById("subtitleDetail");
      const statusDot = document.getElementById("statusDot");

      function applyState(state) {
        const visible = state.status === "speaking" && (state.text || "").trim().length > 0;
        const detailVisible = Boolean(state.show_detail && state.detail);
        speakerName.textContent = state.speaker_name || "2ten";
        text.textContent = state.text || "";
        detail.textContent = state.detail || "";
        detail.dataset.visible = String(detailVisible);
        subtitle.dataset.visible = String(visible);
        statusDot.dataset.status = state.status || "idle";
      }

      function connect() {
        const events = new EventSource("/events");
        events.addEventListener("overlay_state", (event) => {
          applyState(JSON.parse(event.data));
        });
        events.onerror = () => {
          statusDot.dataset.status = "error";
        };
      }

      connect();
    </script>
  </body>
</html>
